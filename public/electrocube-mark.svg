<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Electrocube">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00f6ff"/>
      <stop offset="1" stop-color="#5268ff"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#8a48ff"/>
